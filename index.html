<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🍽 Nosso Diário de Restaurantes</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --cream: #FAF7F2; --ink: #1A1612; --muted: #7A6E65; --border: #E0D9D0;
    --gold: #C49A3C; --gold-light: #F5EDD6;
    --green: #2D6A4F; --green-light: #D8EDDF;
    --red: #8B2020; --red-light: #F5DADA;
    --amber: #8B5E00; --amber-light: #FFF0CC;
    --white: #FFFFFF;
    --card-shadow: 0 1px 3px rgba(26,22,18,0.08), 0 4px 16px rgba(26,22,18,0.04);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; }

  .site-header { background: var(--ink); color: var(--cream); padding: 2rem 1.5rem 1.5rem; text-align: center; position: relative; overflow: hidden; }
  .site-header::before { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(45deg, transparent, transparent 40px, rgba(196,154,60,0.04) 40px, rgba(196,154,60,0.04) 41px); }
  .site-header h1 { font-family: 'Playfair Display', serif; font-size: clamp(24px,5vw,36px); font-weight: 600; letter-spacing: -0.5px; position: relative; }
  .site-header h1 em { color: var(--gold); font-style: italic; }
  .site-header p { font-size: 13px; color: rgba(250,247,242,0.5); margin-top: 4px; letter-spacing: 0.5px; text-transform: uppercase; position: relative; }

  .container { max-width: 760px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }

  .toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; }
  .search-input { flex: 1; min-width: 180px; height: 40px; padding: 0 14px; border: 1px solid var(--border); border-radius: 8px; background: var(--white); font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--ink); outline: none; transition: border-color 0.2s; }
  .search-input:focus { border-color: var(--gold); }
  .search-input::placeholder { color: var(--muted); }
  .btn { height: 40px; padding: 0 18px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s; border: none; white-space: nowrap; }
  .btn-primary { background: var(--ink); color: var(--cream); }
  .btn-primary:hover { background: #2E2820; }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--ink); color: var(--ink); }
  .btn-gold { background: var(--gold); color: var(--white); }
  .btn-gold:hover { background: #B08830; }
  .count-badge { font-size: 13px; color: var(--muted); margin-left: auto; white-space: nowrap; }

  .sync-bar { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); margin-bottom: 1rem; padding: 8px 12px; background: var(--white); border: 1px solid var(--border); border-radius: 8px; }
  .sync-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .sync-dot.green { background: #2D6A4F; }
  .sync-dot.yellow { background: #C49A3C; animation: pulse 1s infinite; }
  .sync-dot.red { background: #8B2020; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .empty { text-align: center; padding: 4rem 2rem; color: var(--muted); }
  .empty-icon { font-size: 48px; margin-bottom: 1rem; display: block; }
  .empty h2 { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--ink); margin-bottom: 0.5rem; }
  .empty p { font-size: 14px; line-height: 1.6; max-width: 300px; margin: 0 auto; }

  .rest-card { background: var(--white); border: 1px solid var(--border); border-radius: 12px; box-shadow: var(--card-shadow); margin-bottom: 1rem; overflow: hidden; animation: fadeUp 0.3s ease both; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .card-top { padding: 1.25rem 1.25rem 1rem; display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; }
  .card-info h2 { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 600; color: var(--ink); margin-bottom: 4px; }
  .card-meta { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .meta-tag { font-size: 11px; padding: 2px 8px; border-radius: 20px; background: var(--cream); color: var(--muted); border: 1px solid var(--border); }
  .score-circle { width: 56px; height: 56px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; border: 2px solid; }
  .score-circle .num { font-size: 18px; font-weight: 500; line-height: 1; }
  .score-circle .den { font-size: 10px; opacity: 0.7; }
  .score-green { border-color: var(--green); color: var(--green); background: var(--green-light); }
  .score-amber { border-color: var(--amber); color: var(--amber); background: var(--amber-light); }
  .score-red   { border-color: var(--red);   color: var(--red);   background: var(--red-light); }
  .score-gray  { border-color: var(--border); color: var(--muted); background: var(--cream); }

  .card-criteria { padding: 0 1.25rem 1.25rem; display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px; }
  .crit-item { background: var(--cream); border-radius: 8px; padding: 10px 12px; border: 1px solid var(--border); }
  .crit-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 5px; }
  .stars-row { display: flex; gap: 3px; margin-bottom: 4px; }
  .star { font-size: 14px; line-height: 1; }
  .crit-note { font-size: 11px; color: var(--muted); font-style: italic; line-height: 1.4; }
  .card-actions { display: flex; gap: 8px; padding: 10px 1.25rem; border-top: 1px solid var(--border); background: var(--cream); }
  .btn-sm { height: 30px; padding: 0 12px; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 12px; cursor: pointer; border: 1px solid var(--border); background: var(--white); color: var(--muted); transition: all 0.15s; }
  .btn-sm:hover { border-color: var(--ink); color: var(--ink); }
  .btn-sm.danger:hover { border-color: var(--red); color: var(--red); }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,22,18,0.6); z-index: 100; overflow-y: auto; padding: 2rem 1rem; }
  .modal-overlay.open { display: flex; align-items: flex-start; justify-content: center; }
  .modal { background: var(--white); border-radius: 16px; width: 100%; max-width: 600px; box-shadow: 0 20px 60px rgba(26,22,18,0.25); animation: modalIn 0.25s ease; }
  @keyframes modalIn { from{opacity:0;transform:translateY(16px) scale(0.98)} to{opacity:1;transform:translateY(0) scale(1)} }
  .modal-header { padding: 1.5rem 1.5rem 1rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .modal-header h2 { font-family: 'Playfair Display', serif; font-size: 20px; }
  .modal-close { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border); background: none; cursor: pointer; font-size: 18px; color: var(--muted); display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .modal-close:hover { background: var(--cream); color: var(--ink); }
  .modal-body { padding: 1.5rem; }
  .modal-footer { padding: 1rem 1.5rem; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }

  .form-section { margin-bottom: 1.5rem; }
  .form-section h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .form-row.single { grid-template-columns: 1fr; }
  .form-field { display: flex; flex-direction: column; gap: 4px; }
  .form-field label { font-size: 12px; color: var(--muted); font-weight: 500; }
  .form-input, .form-select { height: 38px; padding: 0 12px; border: 1px solid var(--border); border-radius: 7px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--ink); background: var(--white); outline: none; transition: border-color 0.2s; }
  .form-input:focus, .form-select:focus { border-color: var(--gold); }
  .form-input::placeholder { color: var(--muted); opacity: 0.6; }

  .crit-form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }
  .crit-form-item { background: var(--cream); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
  .crit-form-label { font-size: 13px; font-weight: 500; color: var(--ink); margin-bottom: 8px; }
  .star-picker { display: flex; gap: 4px; margin-bottom: 8px; }
  .star-btn { width: 32px; height: 32px; font-size: 18px; border: 1px solid var(--border); border-radius: 6px; background: var(--white); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.1s; line-height: 1; }
  .star-btn.on { background: var(--gold-light); border-color: var(--gold); }
  .star-btn:hover { transform: scale(1.1); }
  .clear-btn { font-size: 11px; border: none; background: none; color: var(--muted); cursor: pointer; text-decoration: underline; padding: 0; font-family: 'DM Sans', sans-serif; }
  .crit-comment-input { width: 100%; padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--ink); background: var(--white); outline: none; resize: none; transition: border-color 0.2s; height: 52px; margin-top: 6px; }
  .crit-comment-input:focus { border-color: var(--gold); }
  .crit-comment-input::placeholder { color: var(--muted); opacity: 0.6; }

  .filter-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; }
  .filter-chip { height: 30px; padding: 0 14px; border-radius: 20px; font-size: 12px; font-family: 'DM Sans', sans-serif; cursor: pointer; border: 1px solid var(--border); background: var(--white); color: var(--muted); transition: all 0.15s; }
  .filter-chip.active { background: var(--ink); color: var(--cream); border-color: var(--ink); }

  @media (max-width: 500px) {
    .form-row { grid-template-columns: 1fr; }
    .crit-form-grid { grid-template-columns: 1fr; }
    .card-criteria { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<header class="site-header">
  <h1>Nosso <em>Diário</em> de Restaurantes</h1>
  <p>avaliações a dois</p>
</header>

<div class="container">
  <div class="toolbar">
    <input class="search-input" id="searchInput" placeholder="Buscar restaurante..." oninput="render()" />
    <button class="btn btn-primary" onclick="openModal()">+ Novo</button>
    <span class="count-badge" id="countBadge"></span>
  </div>

  <div class="sync-bar">
    <div class="sync-dot yellow" id="syncDot"></div>
    <span id="syncMsg">Conectando ao banco de dados...</span>
  </div>

  <div class="filter-bar" id="filterBar"></div>
  <div id="listContainer"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="overlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">Novo restaurante</h2>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-section">
        <h3>Informações gerais</h3>
        <div class="form-row single">
          <div class="form-field">
            <label>Nome do restaurante *</label>
            <input class="form-input" id="fNome" placeholder="Ex: Restaurante do João" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-field">
            <label>Cidade / Bairro</label>
            <input class="form-input" id="fLocal" placeholder="Ex: Pinheiros, SP" />
          </div>
          <div class="form-field">
            <label>Tipo de cozinha</label>
            <select class="form-select" id="fTipo">
              <option value="">Selecione...</option>
              <option>Brasileira</option><option>Italiana</option><option>Japonesa</option>
              <option>Pizza</option><option>Churrasco</option><option>Frutos do Mar</option>
              <option>Árabe</option><option>Mexicana</option><option>Contemporânea</option>
              <option>Francesa</option><option>Peruana</option><option>Hamburgueria</option>
              <option>Outro</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-field">
            <label>Data da visita</label>
            <input class="form-input" id="fData" type="date" />
          </div>
          <div class="form-field">
            <label>Quem avaliou</label>
            <select class="form-select" id="fQuem">
              <option value="">Selecione...</option>
              <option>Nós dois</option><option>Só eu</option><option>Só ela</option>
            </select>
          </div>
        </div>
      </div>
      <div class="form-section">
        <h3>Avaliações (0 a ★★★)</h3>
        <div class="crit-form-grid" id="critGrid"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-gold" onclick="saveEntry()">Salvar avaliação</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDCKyXe4tGQi0fGNdE0KmnC-L48_-9b9PA",
  authDomain: "diario-restaurantes.firebaseapp.com",
  projectId: "diario-restaurantes",
  storageBucket: "diario-restaurantes.firebasestorage.app",
  messagingSenderId: "570031633782",
  appId: "1:570031633782:web:09aad4ef6423a9dc8fb657"
};

const fireApp = initializeApp(firebaseConfig);
const db = getFirestore(fireApp);

const CRITERIOS = [
  {id:'comida',label:'🍴 Comida'},
  {id:'atendimento',label:'🙋 Atendimento'},
  {id:'espera',label:'⏱ Espera'},
  {id:'preco',label:'💰 Preço/Custo-benefício'},
  {id:'ambiente',label:'✨ Ambiente'},
  {id:'sobremesa',label:'🍮 Sobremesa'},
  {id:'estacionamento',label:'🚗 Estacionamento'},
  {id:'bebidas',label:'🍷 Bebidas'},
];

let data = [];
let editId = null;
let starState = {};
let activeFilter = '';

function setSyncStatus(state, msg) {
  document.getElementById('syncDot').className = 'sync-dot ' + state;
  document.getElementById('syncMsg').textContent = msg;
}

// Escuta em tempo real o Firestore
const q = query(collection(db, 'restaurantes'), orderBy('createdAt', 'desc'));
onSnapshot(q,
  snapshot => {
    data = snapshot.docs.map(d => ({ firestoreId: d.id, ...d.data() }));
    setSyncStatus('green', `Sincronizado · ${data.length} restaurante${data.length!==1?'s':''}`);
    render();
  },
  err => {
    console.error(err);
    setSyncStatus('red', 'Erro de conexão. Verifique as regras do Firestore.');
  }
);

function scoreClass(avg) {
  if (avg === null) return 'score-gray';
  if (avg >= 2.5) return 'score-green';
  if (avg >= 1.5) return 'score-amber';
  return 'score-red';
}
function starsHTML(score) {
  let s = '';
  for (let i = 1; i <= 3; i++) s += `<span class="star">${i <= score ? '★' : '☆'}</span>`;
  return s;
}
function calcAvg(criterios) {
  const vals = Object.values(criterios || {}).map(c => c.score).filter(s => s > 0);
  if (!vals.length) return null;
  return vals.reduce((a,b)=>a+b,0)/vals.length;
}

window.render = function() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const types = [...new Set(data.map(r => r.tipo).filter(Boolean))].sort();

  const fb = document.getElementById('filterBar');
  fb.innerHTML = `<button class="filter-chip${!activeFilter?' active':''}" onclick="setFilter('')">Todos</button>` +
    types.map(t => `<button class="filter-chip${activeFilter===t?' active':''}" onclick="setFilter('${t}')">${t}</button>`).join('');

  let list = [...data];
  if (q) list = list.filter(r => r.nome?.toLowerCase().includes(q) || (r.local||'').toLowerCase().includes(q) || (r.tipo||'').toLowerCase().includes(q));
  if (activeFilter) list = list.filter(r => r.tipo === activeFilter);

  document.getElementById('countBadge').textContent = data.length ? `${data.length} restaurante${data.length!==1?'s':''}` : '';

  const cont = document.getElementById('listContainer');
  if (list.length === 0) {
    cont.innerHTML = `<div class="empty">
      <span class="empty-icon">${q||activeFilter?'🔍':'🍽'}</span>
      <h2>${q||activeFilter?'Nenhum resultado':'Ainda sem avaliações'}</h2>
      <p>${q||activeFilter?'Tente outro termo ou filtro.':'Clique em <strong>+ Novo</strong> para registrar o primeiro restaurante!'}</p>
    </div>`;
    return;
  }

  cont.innerHTML = list.map(r => {
    const avg = calcAvg(r.criterios);
    const avgStr = avg !== null ? avg.toFixed(1) : '—';
    const critsHTML = CRITERIOS.filter(c => r.criterios?.[c.id]?.score > 0).map(c => {
      const cr = r.criterios[c.id];
      return `<div class="crit-item">
        <div class="crit-label">${c.label}</div>
        <div class="stars-row">${starsHTML(cr.score)}</div>
        ${cr.comment ? `<div class="crit-note">"${cr.comment}"</div>` : ''}
      </div>`;
    }).join('');
    const metaTags = [r.tipo, r.local, r.data ? new Date(r.data+'T12:00').toLocaleDateString('pt-BR') : null, r.quem].filter(Boolean).map(t=>`<span class="meta-tag">${t}</span>`).join('');
    return `<div class="rest-card">
      <div class="card-top">
        <div class="card-info">
          <h2>${r.nome}</h2>
          <div class="card-meta">${metaTags}</div>
        </div>
        <div class="score-circle ${scoreClass(avg)}">
          <span class="num">${avgStr}</span>
          <span class="den">/3</span>
        </div>
      </div>
      ${critsHTML ? `<div class="card-criteria">${critsHTML}</div>` : ''}
      <div class="card-actions">
        <button class="btn-sm" onclick="editEntry('${r.firestoreId}')">✏ Editar</button>
        <button class="btn-sm danger" onclick="deleteEntry('${r.firestoreId}')">Excluir</button>
      </div>
    </div>`;
  }).join('');
}

window.setFilter = function(t) { activeFilter = t; render(); }

window.openModal = function(r) {
  editId = r ? r.firestoreId : null;
  document.getElementById('modalTitle').textContent = r ? 'Editar avaliação' : 'Novo restaurante';
  document.getElementById('fNome').value = r?.nome || '';
  document.getElementById('fLocal').value = r?.local || '';
  document.getElementById('fTipo').value = r?.tipo || '';
  document.getElementById('fData').value = r?.data || new Date().toISOString().split('T')[0];
  document.getElementById('fQuem').value = r?.quem || '';
  buildCritGrid(r?.criterios);
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

window.closeModal = function() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
  editId = null;
}

window.overlayClick = function(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

window.editEntry = function(id) {
  const r = data.find(x => x.firestoreId === id);
  if (r) openModal(r);
}

window.deleteEntry = async function(id) {
  if (!confirm('Excluir esta avaliação?')) return;
  await deleteDoc(doc(db, 'restaurantes', id));
}

function buildCritGrid(existing) {
  const grid = document.getElementById('critGrid');
  starState = {};
  grid.innerHTML = CRITERIOS.map(c => {
    const ex = existing?.[c.id] || {};
    starState[c.id] = ex.score || 0;
    return `<div class="crit-form-item">
      <div class="crit-form-label">${c.label}</div>
      <div style="display:flex;align-items:center;gap:6px;">
        <div class="star-picker" id="picker-${c.id}">
          ${[1,2,3].map(i=>`<button type="button" class="star-btn${(ex.score||0)>=i?' on':''}" onclick="setStar('${c.id}',${i})">★</button>`).join('')}
        </div>
        <button type="button" class="clear-btn" onclick="setStar('${c.id}',0)">limpar</button>
      </div>
      <textarea class="crit-comment-input" id="cc-${c.id}" placeholder="Comentário...">${ex.comment||''}</textarea>
    </div>`;
  }).join('');
}

window.setStar = function(id, val) {
  starState[id] = val;
  document.getElementById('picker-'+id).querySelectorAll('.star-btn').forEach((btn,i) => {
    btn.classList.toggle('on', i < val);
  });
}

window.saveEntry = async function() {
  const nome = document.getElementById('fNome').value.trim();
  if (!nome) { document.getElementById('fNome').focus(); alert('Informe o nome do restaurante.'); return; }

  setSyncStatus('yellow', 'Salvando...');
  const criterios = {};
  CRITERIOS.forEach(c => {
    const score = starState[c.id] || 0;
    const comment = document.getElementById('cc-'+c.id)?.value.trim() || '';
    if (score || comment) criterios[c.id] = { score, comment };
  });

  const entry = {
    nome,
    local: document.getElementById('fLocal').value.trim(),
    tipo: document.getElementById('fTipo').value,
    data: document.getElementById('fData').value,
    quem: document.getElementById('fQuem').value,
    criterios,
    updatedAt: Date.now(),
  };

  try {
    if (editId) {
      await updateDoc(doc(db, 'restaurantes', editId), entry);
    } else {
      entry.createdAt = Date.now();
      await addDoc(collection(db, 'restaurantes'), entry);
    }
    closeModal();
  } catch(e) {
    console.error(e);
    setSyncStatus('red', 'Erro ao salvar: ' + e.message);
    alert('Erro ao salvar: ' + e.message);
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
</body>
</html>
